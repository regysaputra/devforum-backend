name: Continuous Deployment
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "=== Current PATH ==="
            echo $PATH
            echo "=== Finding npm ==="
            which npm || echo "npm not found in PATH"
            find /usr -name npm -type f 2>/dev/null | head -5
            find /usr/local -name npm -type f 2>/dev/null | head -5
            find /home -name npm -type f 2>/dev/null | head -5
            echo "=== Finding pm2 ==="
            which pm2 || echo "pm2 not found in PATH"
            find /usr -name pm2 -type f 2>/dev/null | head -5
            find /usr/local -name pm2 -type f 2>/dev/null | head -5
            find /home -name pm2 -type f 2>/dev/null | head -5
          debug: true
