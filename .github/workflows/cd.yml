name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"] # Must match the 'name' of your CI workflow
    types:
      - completed

jobs:
  deploy:
    # Crucial: This ensures deployment ONLY happens if CI passed.
    # Without this, it would try to deploy even if CI failed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e # Stop script immediately on error
            
            # Define your variables for cleaner code
            APP_DIR="devforum-backend"
            REPO_URL="git@github.com:regysaputra/devforum-backend.git"

            # 1. Check if the application directory exists
            if [ ! -d "$APP_DIR" ]; then
              echo "Directory does not exist. Performing initial clone..."
              # Create the parent directories if needed
              mkdir -p "$APP_DIR"
              # Clone the repository directly into the target folder
              git clone "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            else
              echo "Directory exists. Pulling latest updates..."
              cd "$APP_DIR"

              # Ensure the server's working tree is clean to prevent merge conflicts
              git reset --hard

              # Pull the latest code
              git pull origin main
            fi
            
            # --- NEW .ENV CHECK LOGIC ---
            if [ ! -f .env ]; then
              echo "⚠️ .env file does not exist. Creating an .env file..."
              
              cat <<EOF > .env
              APP_NAME=${{ vars.APP_NAME }}
              HOST=${{ vars.HOST }}
              PORT=${{ vars.PORT }}
              DATABASE_URL=${{ secrets.DATABASE_URL }}
              JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
              SMTP_HOST=${{ secrets.SMTP_HOST }}
              SMTP_PORT=${{ secrets.SMTP_PORT }}
              SMTP_USER=${{ secrets.SMTP_USER }}
              SMTP_PASS=${{ secrets.SMTP_PASS }}
              SMTP_FROM=${{ secrets.SMTP_FROM }}
              TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
              TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
              TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}
              WHATSAPP_ACCESS_TOKEN=${{ secrets.WHATSAPP_ACCESS_TOKEN }}
              EOF
            else
              echo "✅ .env file already exists."
            fi
            # ----------------------------
            
            # 2. Install production dependencies
            npm ci --production

            # 3. Run database migrations
            npm run migrate up

            # 4. Restart or Start PM2
            # If PM2 doesn't know about the app yet (first run), 'reload' will fail. 
            # The '||' operator catches that failure and runs 'start' instead.
            pm2 reload ecosystem.config.cjs --env production --update-env || pm2 start ecosystem.config.cjs --env production

            # 5. Persist the PM2 list across server reboots
            pm2 save